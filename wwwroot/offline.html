<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111827">
    <title>Sin conexion - Success Tickets</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8fafc;
            color: #111827;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        main {
            width: min(440px, 100%);
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #ffffff;
            padding: 28px;
            box-shadow: 0 16px 40px rgba(17, 24, 39, 0.08);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.5rem;
        }

        p {
            margin: 0;
            color: #4b5563;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<main>
    <h1>Sin conexion</h1>
    <p>Success Tickets necesita conexion con el servidor para iniciar sesion y validar tickets. Revisa la red e intenta de nuevo.</p>
</main>
</body>
</html>
